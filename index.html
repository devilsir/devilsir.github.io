<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Simulações Interativas</title>
<meta name="description" content="Atividades interativas de Química e Física para estudo e prática.">
<link rel="stylesheet" href="assets/css/style.css">
<style>
.toolbar .search {
  gap: 0;
}

#gallery img,
#gallery svg,
#gallery picture,
#gallery figure,
#gallery [class*="icon"],
#gallery [class*="icone"],
#gallery [class*="thumb"],
#gallery [class*="image"],
#gallery [class*="imagem"],
#gallery [class*="avatar"],
#gallery [class*="media"],
#gallery [class*="visual"],
#gallery [aria-hidden="true"] {
  display: none !important;
  width: 0 !important;
  min-width: 0 !important;
  max-width: 0 !important;
  height: 0 !important;
  min-height: 0 !important;
  max-height: 0 !important;
  margin: 0 !important;
  padding: 0 !important;
  border: 0 !important;
  flex: 0 0 0 !important;
  overflow: hidden !important;
}

#gallery,
#gallery * {
  background-image: none;
}

#gallery article,
#gallery a,
#gallery button,
#gallery .card,
#gallery [class*="card"],
#gallery [class*="item"] {
  gap: .45rem !important;
}

#gallery article > *,
#gallery a > *,
#gallery button > *,
#gallery .card > *,
#gallery [class*="card"] > *,
#gallery [class*="item"] > * {
  margin-left: 0 !important;
}
</style>
</head>
<body>
<div class="wrap">
<header>
<div>
<p class="eyebrow">Hub de Animações</p>
<h1>Simulações Interativas</h1>
<p class="subtitle">Escolha uma atividade para explorar conceitos de Química e Física de forma visual e interativa.</p>
</div>
<div class="counter"><span id="count">0</span><small>simulações</small></div>
</header>
<section class="toolbar" aria-label="Busca de atividades">
<label class="search">
<input id="q" type="search" placeholder="Buscar atividade">
</label>
</section>
<main id="gallery" class="gallery" aria-live="polite"></main>
</div>
<div id="overlay" class="overlay" hidden>
<div class="overlay-head">
<strong id="overlayTitle">Atividade</strong>
<div class="overlay-actions">
<a id="openDirect" class="btn" target="_blank" rel="noopener">Abrir em nova aba</a>
<button id="closeOverlay" class="btn" type="button">Fechar</button>
</div>
</div>
<iframe id="stage" title="Visualização da atividade" allowfullscreen></iframe>
</div>
<script src="assets/js/main.js"></script>
</body>
</html>
