<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Hub de Simulações — estilo PhET (arquivo único)</title>
<meta name="description" content="Coleção de simulações em um único arquivo com miniaturas clicáveis." />
<style>
  :root{
    --bg:#0b1220; --panel:#141b2d; --soft:#1b2338; --ink:#e8edf7; --muted:#a7b0c6; --accent:#6cf;
    --card:#12192b; --border:#243252; --green:#64f4a4; --orange:#ffb86b;
  }
  *{box-sizing:border-box}
  html,body{height:100%}
  body{margin:0;background:linear-gradient(140deg,#0a0f1d,#0e1529);color:var(--ink);font:15px/1.45 system-ui,Segoe UI,Roboto,Helvetica,Arial,sans-serif;}
  a{color:var(--accent);text-decoration:none}

  .wrap{max-width:1200px;margin:0 auto;padding:18px}
  header{display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap;margin-bottom:12px}
  .title{font-weight:900;font-size:22px;letter-spacing:.2px}
  .badges{display:none!important}
  .pill{display:inline-flex;align-items:center;gap:6px;padding:6px 10px;border-radius:999px;border:1px solid var(--border);background:#1a2440;font-size:12px;color:#cfe0ff}

  .toolbar{display:flex;gap:10px;flex-wrap:wrap;align-items:center;margin:10px 0}
  .search{flex:1;min-width:210px;display:flex;align-items:center;gap:8px;background:#121a31;border:1px solid var(--border);border-radius:12px;padding:8px 10px}
  .search input{flex:1;background:transparent;border:0;outline:0;color:var(--ink)}
  .layout{display:grid;grid-template-columns:1fr;gap:16px}
  @media(min-width:1000px){.layout{grid-template-columns:1.1fr 1fr}}

  .gallery{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:14px}
  .card{background:var(--card);border:1px solid var(--border);border-radius:16px;overflow:hidden;box-shadow:0 10px 30px rgba(0,0,0,.35)}
  .thumb-wrap{position:relative;height:110px;background:#0f1528;border-bottom:1px solid var(--border);cursor:pointer}
  .thumb-title{display:none !important; position:absolute;left:8px;top:8px;font-size:12px;color:#cfe0ff;background:#0b1220cc;padding:3px 6px;border-radius:6px;border:1px solid var(--border);max-width:70%;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .thumb-wrap::after{content:"Clique para abrir";position:absolute;right:8px;bottom:8px;font-size:11px;color:#cfe0ff80;background:#0b122080;padding:4px 6px;border-radius:6px;border:1px solid var(--border);opacity:0;transition:opacity .2s}
  .thumb-wrap:hover::after{opacity:1}
  .thumb-inner{position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);transform-origin:top left}
  .thumb-iframe{border:0;pointer-events:none;display:block;background:#0a0f1d}
  .card-body{padding:10px}
  .card h4{margin:0 0 6px;font-size:13px}
  .tags{display:flex;gap:6px;flex-wrap:wrap}
  .tag{font-size:11px;border:1px solid var(--border);padding:2px 6px;border-radius:999px;color:#a8b6d9;background:#10182c}
  .card button{margin-top:10px;width:100%;padding:8px 10px;border-radius:10px;border:1px solid var(--border);background:#172139;color:#cfe0ff;cursor:pointer}
  .card button:hover{filter:brightness(1.08)}

  .viewer{display:none !important}
  .viewer-head{display:flex;align-items:center;justify-content:space-between;padding:10px 12px;border-bottom:1px solid var(--border)}
  .viewer-title{font-weight:700}
  .viewer-actions{display:flex;gap:8px}
  .btn{display:inline-flex;align-items:center;gap:6px;padding:8px 10px;border-radius:10px;border:1px solid var(--border);background:#1a2440;color:#cfe0ff;cursor:pointer}
  .btn:hover{filter:brightness(1.08)}
  .viewer-iframe{width:100%;height:min(80vh,860px);border:0;background:#0a0f1d}

  footer{margin-top:14px;text-align:center;color:#9bb0d6;font-size:12px}

  .overlay{position:fixed;inset:0;background:#000;z-index:9999;display:flex;align-items:center;justify-content:center}
  .overlay .full-iframe{width:100vw;height:100vh;border:0;background:#000}
  .overlay .close{position:fixed;top:12px;right:12px;padding:8px 10px;border-radius:10px;border:1px solid var(--border);background:#0b1220cc;color:#cfe0ff;cursor:pointer;z-index:10000}
  .overlay .close:hover{filter:brightness(1.1)}


  .thumb-img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;display:block}

</style>
</head>
<body>
  <div class="wrap">
    <header>
      <div class="title">🔬 Hub de Simulações (arquivo único)</div>
      <div class="badges">
        <span class="pill">Estilo PhET</span>
        <span class="pill">Miniaturas clicáveis</span>
        <span class="pill">Iframes com srcdoc</span>
      </div>
    </header>

    <div class="toolbar">
      <div class="search">
        <span>🔎</span>
        <input id="q" placeholder="Buscar por título ou tag…" />
      </div>
      <div class="pill">Simulações: <span id="count">0</span></div>
    </div>

    <div class="layout">
      <div style="grid-column:1/-1">
        <div id="gallery" class="gallery"></div>
      </div>
      <div class="viewer">
        <div class="viewer-head" style="display:none">
          <div class="viewer-title" id="viewerTitle">Selecione uma simulação na esquerda</div>
          <div class="viewer-actions">
            <button class="btn" id="btnOpen">Abrir em nova aba</button>
            <button class="btn" id="btnFS">Tela cheia</button>
            <button class="btn" id="btnClear">Fechar</button>
          </div>
        </div>
        <iframe id="viewer" class="viewer-iframe" sandbox="allow-scripts allow-forms allow-modals allow-pointer-lock allow-popups allow-same-origin" referrerpolicy="no-referrer"></iframe>
      </div>
    </div>

    <footer>Autor: <b>Lucas Xavier Nardelli 2025</b></footer>
  </div>

  <script>
    // --- Util: base64 UTF-8 -> string ---
    function b64ToUtf8(b64) {
      const bin = atob(b64);
      const bytes = new Uint8Array(bin.length);
      for (let i=0;i<bin.length;i++) bytes[i] = bin.charCodeAt(i);
      try { return new TextDecoder('utf-8').decode(bytes); }
      catch (e) { // fallback
        return decodeURIComponent(escape(bin));
      }

    const gallery = document.getElementById('gallery');
    const viewer = document.getElementById('viewer');
    const viewerTitle = document.getElementById('viewerTitle');
    const btnOpen = document.getElementById('btnOpen');
    const btnFS = document.getElementById('btnFS');
    const btnClear = document.getElementById('btnClear');
    const q = document.getElementById('q');
    const count = document.getElementById('count');

    function getHtmlById(b64_id) {
      const el = document.getElementById(b64_id);
      return el ? b64ToUtf8(el.textContent.trim()) : '<h1>Erro: conteúdo não encontrado</h1>';
    }

    function makeCard(sim) {
      const card = document.createElement('div'); card.className = 'card'; card.tabIndex = 0; card.setAttribute('role','button');

      // Thumb live (iframe reduzido)
      const tw = 1000, th = 700; // base interna
      const scale = sim.thumb_scale || 0.22;
      const wrap = document.createElement('div'); wrap.className='thumb-wrap';
      const inner = document.createElement('div'); inner.className='thumb-inner';
      inner.style.transform = 'translate(-50%,-50%) scale(${scale})';
      const img = document.createElement('img'); img.className='thumb-img'; img.alt = sim.title; img.src = sim.thumb;
      
      wrap.appendChild(img);
      
      wrap.appendChild(inner); card.appendChild(wrap);

      const body = document.createElement('div'); body.className = 'card-body';
      const h4 = document.createElement('h4'); h4.textContent = sim.title; body.appendChild(h4);
      const tags = document.createElement('div'); tags.className='tags';
      (sim.tags||[]).forEach(t => { const s=document.createElement('span'); s.className='tag'; s.textContent=t; tags.appendChild(s); });
      body.appendChild(tags);
      const btn = document.createElement('button'); btn.textContent='Abrir simulação';
      btn.addEventListener('click', () => openSim(sim));
      body.appendChild(btn);
      card.appendChild(body);
      // Abrir ao clicar no card inteiro ou na miniatura
      wrap.addEventListener('click', () => openSim(sim));
      card.addEventListener('click', (e) => {
        // Evita duplicar quando clicar no botão
        if (e.target.tagName.toLowerCase() !== 'button') openSim(sim);
      });
      card.addEventListener('keydown', (e) => {
        if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); openSim(sim); }
      });

      return card;
    }

    function renderGallery() {
      gallery.innerHTML = '';
      const term = (q.value || '').toLowerCase();
      const filtered = SIMS.filter(s => !term || s.title.toLowerCase().includes(term) || (s.tags||[]).some(t => t.toLowerCase().includes(term)));
      filtered.forEach(s => gallery.appendChild(makeCard(s)));
      count.textContent = filtered.length;
    }
    q.addEventListener('input', renderGallery);

    
    let currentSim = null, currentHtml = '';
    function openSim(sim) {
      currentSim = sim;
      currentHtml = getHtmlById(sim.b64_id);
      // Build overlay
      const ov = document.createElement('div'); ov.className='overlay';
      const iframe = document.createElement('iframe'); iframe.className='full-iframe';
      iframe.setAttribute('allowfullscreen','');
      iframe.sandbox = 'allow-scripts allow-forms allow-modals allow-pointer-lock allow-popups allow-same-origin';
      iframe.referrerPolicy = 'no-referrer';
      iframe.srcdoc = currentHtml;
      const close = document.createElement('button'); close.className='close'; close.textContent='Fechar (Esc)';
      function doClose() {
        if (document.fullscreenElement) { document.exitFullscreen().catch(()=>{}); }
        ov.remove();
        document.body.style.overflow='auto';
        window.removeEventListener('keydown', onKey);
      }
      close.addEventListener('click', doClose);
      ov.appendChild(iframe); ov.appendChild(close);
      document.body.appendChild(ov);
      document.body.style.overflow='hidden';
      function onKey(e){ if (e.key === 'Escape') doClose(); }
      window.addEventListener('keydown', onKey);
      const el = ov;
      if (el.requestFullscreen) { el.requestFullscreen().catch(()=>{}); }
    }

    if (btnOpen) btnOpen.addEventListener('click', () => {
      if (!currentHtml) return;
      const url = 'data:text/html;charset=utf-8,' + encodeURIComponent(currentHtml);
      window.open(url, '_blank');
    });

    if (btnFS) btnFS.addEventListener('click', () => {
      const el = viewer;
      if (document.fullscreenElement) {
        document.exitFullscreen();
      } else {
        if (el.requestFullscreen) el.requestFullscreen();
      }
    });

    if (btnClear) btnClear.addEventListener('click', () => {
      currentSim = null; currentHtml = ''; viewer.srcdoc = ''; viewerTitle.textContent = 'Selecione uma simulação na esquerda';
    });

    // Inicializa
    renderGallery();
  </script>
</body>
