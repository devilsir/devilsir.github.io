    &lt;div class=&quot;card&quot; style=&quot;font-size:13px; color:#9fb0c8&quot;&gt;
      HCl (“agaceele”) ⇒ precipitado branco (AgCl, PbCl₂, Hg₂Cl₂).  
      Em amônia: &lt;b&gt;PbCl₂&lt;/b&gt; permanece (sem efeito), &lt;b&gt;AgCl&lt;/b&gt; dissolve (complexo [Ag(NH₃)₂]⁺), &lt;b&gt;Hg₂Cl₂&lt;/b&gt; escurece (Hg⁰ + HgNH₂Cl).

&lt;script&gt;
(function(){
  const lines = Array.from(document.querySelectorAll('.line'));
  const showLine = (idx) =&gt; {
    lines.forEach(el =&gt; el.classList.remove('active'));
    if (idx&gt;=0 &amp;&amp; idx&lt;lines.length) lines[idx].classList.add('active');
  };

  // Elements
  const pipHCl = document.getElementById('pipHCl');
  const dropHCl = document.getElementById('dropHCl');
  const tubes = document.getElementById('tubes');
  const pipNH3 = document.getElementById('pipNH3');
  const dropNH3 = document.getElementById('dropNH3');

  const pptPb = document.getElementById('pptPb');
  const pptAg = document.getElementById('pptAg');
  const pptHg = document.getElementById('pptHg');

  const liqAg = document.getElementById('liqAg');
  const liqHg = document.getElementById('liqHg');

  const playBtn = document.getElementById('play');
  const pauseBtn = document.getElementById('pause');
  const resetBtn = document.getElementById('reset');

  let playing = false;
  let current = -1;       // step index
  let timer = null;

  // Tube center X positions for NH3 pipette (already absolute)
  const X_PB = 385;  // 340 + 0 + 45
  const X_AG = 515;  // 340 + 130 + 45
  const X_HG = 645;  // 340 + 260 + 45

  function setOpacity(el, v){ el.style.opacity = String(v); }
  function reveal(el){ el.classList.remove('hidden'); setOpacity(el,1); }
  function hide(el){ setOpacity(el,0); el.classList.add('hidden'); }

  function moveNH3(x, y){ pipNH3.setAttribute('transform', `translate(${x},${y})`); }
  function dropOnce(el){
    setOpacity(el,1);
    el.classList.remove('fall'); void el.offsetWidth; el.classList.add('fall');
    setTimeout(()=&gt; setOpacity(el,0), 1000);
  }

  // Hard reset of visuals
  function resetScene(){
    if (timer) { clearTimeout(timer); timer=null; }
    playing = false; current = -1;
    lines.forEach(el =&gt; el.classList.remove('active'));
    hide(pipHCl); hide(pipNH3); hide(tubes);
    [dropHCl, dropNH3].forEach(d =&gt; { d.classList.remove('fall'); setOpacity(d,0); });

    [pptPb,pptAg,pptHg].forEach(p =&gt; {
      p.setAttribute('height','12'); p.setAttribute('y','228'); setOpacity(p,0);
      p.style.fill='#ffffff'; p.classList.remove('pulse-clear','pulse-dark');
    });
    [liqAg,liqHg].forEach(l =&gt; { setOpacity(l,0.85); l.style.filter=''; });
    moveNH3(X_PB,5);
    pauseBtn.textContent = '⏸ Pausar';
  }

  // Idempotent state appliers for each step (instant means no falling drop, just final state)
  const steps = [
    {line:0, delay:1000, fn:(instant)=&gt;{ showLine(0); }},
    {line:1, delay:800,  fn:(instant)=&gt;{ showLine(1); }},
    {line:2, delay:800,  fn:(instant)=&gt;{ showLine(2); }},
    {line:3, delay:900,  fn:(instant)=&gt;{ showLine(3); }},
    {line:4, delay:700,  fn:(instant)=&gt;{ showLine(4); }},
    {line:5, delay:700,  fn:(instant)=&gt;{ showLine(5); }},
    {line:6, delay:700,  fn:(instant)=&gt;{ showLine(6); }},
    // HCl drop
    {line:7, delay:1200, fn:(instant)=&gt;{
      showLine(7); reveal(pipHCl);
      if (!instant) dropOnce(dropHCl);
    }},
    // reveal tubes + white ppt in all
    {line:8, delay:1200, fn:(instant)=&gt;{
      reveal(tubes); showLine(8);
      [pptPb,pptAg,pptHg].forEach(p =&gt; { setOpacity(p,1); p.setAttribute('y','208'); p.setAttribute('height','32'); });
    }},
    {line:9, delay:900,  fn:(instant)=&gt;{ showLine(9); }},
    // NH3 over Pb (no effect)
    {line:10, delay:900, fn:(instant)=&gt;{
      showLine(10); reveal(pipNH3); moveNH3(X_PB,5); if(!instant) dropOnce(dropNH3);
    }},
    // NH3 over Ag (dissolve)
    {line:11, delay:1000, fn:(instant)=&gt;{
      showLine(11); moveNH3(X_AG,5); if(!instant) dropOnce(dropNH3);
      liqAg.classList.add('pulse-clear'); setOpacity(pptAg,0);
    }},
    // NH3 over Hg (drop)
    {line:12, delay:500, fn:(instant)=&gt;{
      showLine(12); moveNH3(X_HG,5); if(!instant) dropOnce(dropNH3);
    }},
    // Hg blackens
    {line:13, delay:1100, fn:(instant)=&gt;{
      showLine(13);
      liqHg.classList.add('pulse-dark');
      pptHg.style.fill='#0b0b0b'; setOpacity(pptHg,1);
    }},
  ];

  // Map each poem line index to the step index that best represents it
  const cueForLine = (lineIdx)=&gt; Math.min(lineIdx, steps.length-1);

  function applyUpTo(targetStep){
    resetScene(); // clears to baseline
    for(let i=0;i&lt;=targetStep;i++){
      steps[i].fn(true); // instant
    }
    current = targetStep;
  }

  function playFromCurrent(){
    if (playing) return;
    playing = true;
    function runNext(){
      if (!playing) return;
      const next = current + 1;
      if (next &gt;= steps.length){ playing=false; return; }
      current = next;
      const s = steps[current];
      s.fn(false);
      timer = setTimeout(runNext, s.delay);
    }
    runNext();
  }

  function pause(){
    playing = false;
    if (timer){ clearTimeout(timer); timer=null; }
  }

  // UI events
  document.getElementById('play').addEventListener('click', playFromCurrent);
  document.getElementById('pause').addEventListener('click', ()=&gt;{
    if (playing){
      pause();
      pauseBtn.textContent = '▶ Retomar';
    } else {
      pauseBtn.textContent = '⏸ Pausar';
      playFromCurrent();
    }
  });
  document.getElementById('reset').addEventListener('click', resetScene);

  // Click-to-seek on lines
  lines.forEach((el, idx)=&gt;{
    el.title = 'Clique para pular para esta parte';
    el.addEventListener('click', ()=&gt;{
      pause();
      const target = cueForLine(idx);
      applyUpTo(target);
    });
  });

  // bootstrap
  resetScene();
})();
&lt;/script&gt;

&lt;style&gt;
  :root{

    --h2s:#34d399;    /* H2S */
    --ammS:#60a5fa;   /* (NH4)2S */
    --unknown:#8b5cf6;
    --white:#ffffff; --black:#0b0b0b;
    --orange:#f59e0b; --amber:#d97706; --yellow:#fbbf24; --lemon:#fde047;
  }
  *{box-sizing:border-box}
  body{
    margin:0; font-family: system-ui, -apple-system, Segoe UI, Roboto, Ubuntu, Cantarell, &quot;Helvetica Neue&quot;, Arial;
    background: radial-gradient(1200px 800px at 70% -20%, #1f2430 0%, var(--bg) 38%, #0b0d12 100%);
    color:var(--ink); min-height:100vh; display:grid; place-items:center; padding:20px;
  }
  .wrap{display:grid; gap:18px; width:min(1350px, 97vw);}
  .top{display:grid; grid-template-columns:  0.9fr 1.3fr; gap:16px;}
  .card{
    background:linear-gradient(180deg, rgba(255,255,255,0.04), rgba(255,255,255,0.02));
    border:1px solid rgba(255,255,255,0.08);
    border-radius:16px; padding:16px 18px; backdrop-filter: blur(6px);
    box-shadow: 0 20px 50px rgba(0,0,0,0.35), inset 0 1px 0 rgba(255,255,255,0.05);
  }
  h1{font-size:20px;margin:0 0 8px 0; letter-spacing:.3px}
  .poem{line-height:1.6; font-size:15.5px; white-space:pre-line}
  .line{
    color:var(--muted); transition: color .25s, text-shadow .25s, background .25s;
    padding:2px 6px; border-radius:8px; margin:1px 0; cursor:pointer;
  }
  .line:hover{ background: rgba(251,191,36,.1); color:#fef3c7 }
  .line.active{color:var(--ink); text-shadow: 0 0 12px rgba(255,255,255,.18)}
  .hint{font-size:12px;color:#aab3bf;margin-top:6px}
  .controls{display:flex;gap:10px; flex-wrap:wrap}
  button{
    appearance:none; border:none; color:#0b0d12; font-weight:600;
    padding:10px 14px; border-radius:12px; cursor:pointer;
    background: linear-gradient(180deg, #e9edf7, #cfd7e6);
    box-shadow: 0 10px 24px rgba(0,0,0,0.3), inset 0 1px 0 rgba(255,255,255,0.8);
  }
  .ghost{ background:transparent; color:#e5e7eb; border:1px solid rgba(255,255,255,.2); box-shadow:none }
  button:active{transform:translateY(1px)}
  #lab{ width:100%; height:640px; display:block; border-radius:14px;
    background:linear-gradient(180deg, rgba(255,255,255,0.02), rgba(255,255,255,0.00));
    border:1px solid rgba(255,255,255,0.08);
  }

  /* SVG styling */
  .glass{fill:rgba(255,255,255,0.06); stroke:rgba(255,255,255,0.25); stroke-width:2}
  .liquid{fill:var(--unknown); opacity:.9}
  .label{font-size:12px; fill:#c7cfdb}
  .small{font-size:10px}
  .hidden{opacity:0; pointer-events:none}
  .fade{transition:opacity .6s ease}
  .grow{transition:all .6s ease}
  .tube{filter: drop-shadow(0 6px 12px rgba(0,0,0,.5))}
  .pipette{filter: drop-shadow(0 10px 18px rgba(0,0,0,.45))}
  .drop{opacity:0}
  .fall{animation:dropFall 1.0s ease-in forwards}
  @keyframes dropFall{
    0%{opacity:1; transform: translateY(-6px)}
    80%{opacity:1; transform: translateY(165px)}
    100%{opacity:0; transform: translateY(175px)}
  }

  /* H2S bubbling */
  .bubble{opacity:0}
  @keyframes rise{
    0%{opacity:0; transform:translateY(60px)}
    10%{opacity:1}
    80%{opacity:1}
    100%{opacity:0; transform:translateY(-40px)}
  }
  .bubbling .b1{ animation: rise 1.2s ease-in-out 1 both; }
  .bubbling .b2{ animation: rise 1.2s ease-in-out 1 both; animation-delay:.2s;}
  .bubbling .b3{ animation: rise 1.2s ease-in-out 1 both; animation-delay:.4s;}

  /* effects */
  .pulse-clear{animation:pulseClear 1.0s ease-in-out 2}
  @keyframes pulseClear{ 0%{opacity:.6} 50%{opacity:.15} 100%{opacity:.6} }
  .legend{font-size:11px; fill:#b7c0ce}

&lt;script&gt;
(function(){
  const lines = Array.from(document.querySelectorAll('.line'));
  const showLine = (idx) =&gt; {
    lines.forEach(el =&gt; el.classList.remove('active'));
    if (idx&gt;=0 &amp;&amp; idx&lt;lines.length) lines[idx].classList.add('active');
  };

  // Elements
  const hose = document.getElementById('hose');
  const beaker = document.getElementById('beaker');
  const tubes = document.getElementById('tubes');
  const pipAmm = document.getElementById('pipAmm');
  const dropAmm = document.getElementById('dropAmm');

  // ppt rects
  const ppt = {
    Bi: document.getElementById('pptBi'),
    Cu: document.getElementById('pptCu'),
    AuPt: document.getElementById('pptAuPt'),
    Cd: document.getElementById('pptCd'),
    Sb: document.getElementById('pptSb'),
    SnII: document.getElementById('pptSnII'),
    SnIV: document.getElementById('pptSnIV'),
    As: document.getElementById('pptAs')
  };

  const playBtn = document.getElementById('play');
  const pauseBtn = document.getElementById('pause');
  const resetBtn = document.getElementById('reset');

  let playing = false;
  let current = -1;
  let timer = null;

  // Absolute X centers for tubes (tubes group at x=280; each step 80, center at +35)
  const baseX = 230, step = 80, center = 35, topY = 5;
  const X = {
    Bi: baseX + 0*step + center,
    Cu: baseX + 1*step + center,
    AuPt: baseX + 2*step + center,
    Cd: baseX + 3*step + center,
    Sb: baseX + 4*step + center,
    SnII: baseX + 5*step + center,
    SnIV: baseX + 6*step + center,
    As: baseX + 7*step + center
  };

  function setOpacity(el,v){ el.style.opacity=String(v); }
  function reveal(el){ el.classList.remove('hidden'); setOpacity(el,1); }
  function hide(el){ setOpacity(el,0); el.classList.add('hidden'); }
  function movePip(x,y){ pipAmm.setAttribute('transform',`translate(${x},${y})`); }
  function dropOnce(){
    setOpacity(dropAmm,1);
    dropAmm.classList.remove('fall'); void dropAmm.offsetWidth; dropAmm.classList.add('fall');
    setTimeout(()=&gt; setOpacity(dropAmm,0), 1000);
  }

  function resetScene(){
    if (timer) { clearTimeout(timer); timer=null; }
    playing=false; current=-1;
    lines.forEach(el =&gt; el.classList.remove('active'));
    hose.classList.remove('bubbling');
    hide(tubes); hide(pipAmm);
    setOpacity(dropAmm,0); dropAmm.classList.remove('fall');
    for(const k in ppt){
      const r = ppt[k];
      r.setAttribute('height','14'); r.setAttribute('y','236'); setOpacity(r,0);
    }
    movePip(X.Sb, topY);
    pauseBtn.textContent='⏸ Pausar';
  }

  // Steps aligned with lines
  const steps = [
    {line:0, delay:800, fn:(instant)=&gt;{ showLine(0); }},
    {line:1, delay:800, fn:(instant)=&gt;{ showLine(1); }},
    {line:2, delay:900, fn:(instant)=&gt;{ showLine(2); }},
    // Start H2S bubbling
    {line:3, delay:1200, fn:(instant)=&gt;{
      showLine(3);
      hose.classList.add('bubbling');
    }},
    // Blacks appear: Bi, Au/Pt, Cu
    {line:4, delay:800, fn:(instant)=&gt;{
      reveal(tubes); showLine(4);
      [ppt.Bi, ppt.AuPt, ppt.Cu].forEach(p=&gt;{ setOpacity(p,1); p.setAttribute('y','214'); p.setAttribute('height','36'); });
    }},
    {line:5, delay:600, fn:(instant)=&gt;{ showLine(5); }},
    // Note Pb/Hg (raros) — we just highlight line
    {line:6, delay:700, fn:(instant)=&gt;{ showLine(6); }},
    {line:7, delay:700, fn:(instant)=&gt;{ showLine(7); }},
    // Sb orange
    {line:8, delay:600, fn:(instant)=&gt;{ showLine(8); setOpacity(ppt.Sb,1); pGrow(ppt.Sb); }},
    // Sn(II) amber
    {line:9, delay:600, fn:(instant)=&gt;{ showLine(9); setOpacity(ppt.SnII,1); pGrow(ppt.SnII); }},
    // Cd + Sn(IV) + As yellows
    {line:10, delay:800, fn:(instant)=&gt;{
      showLine(10);
      [ppt.Cd, ppt.SnIV, ppt.As].forEach(p=&gt;{ setOpacity(p,1); pGrow(p); });
    }},
    // Aparece (NH4)2S
    {line:11, delay:500, fn:(instant)=&gt;{ showLine(11); reveal(pipAmm); movePip(X.SnII, topY); }},
    {line:12, delay:400, fn:(instant)=&gt;{ showLine(12); movePip(X.Sb, topY); if(!instant) dropOnce(); }},
    // dissolve hint
    {line:13, delay:600, fn:(instant)=&gt;{ showLine(13); setOpacity(ppt.Sb,0); }},
    // (NH4)2S dissolve others: Sn(II), Sn(IV), As, Au/Pt
    {line:14, delay:1200, fn:(instant)=&gt;{
      showLine(14);
      [ ['SnII',X.SnII], ['SnIV',X.SnIV], ['As',X.As], ['AuPt',X.AuPt] ].forEach(([k,x],i)=&gt;{
        setTimeout(()=&gt;{ movePip(x, topY); if(!instant) dropOnce(); setOpacity(ppt[k],0); }, i*250);
      });
    }},
  ];

  function pGrow(r){ r.setAttribute('y','214'); r.setAttribute('height','36'); }

  const cueForLine = (idx)=&gt; Math.min(idx, steps.length-1);

  function applyUpTo(target){
    resetScene();
    for(let i=0;i&lt;=target;i++){ steps[i].fn(true); }
    current = target;
  }

  function runFromCurrent(){
    if (playing) return;
    playing = true;
    function next(){
      if (!playing) return;
      const n = current + 1;
      if (n &gt;= steps.length){ playing=false; return; }
      current = n;
      const s = steps[current];
      s.fn(false);
      timer = setTimeout(next, s.delay);
    }
    next();
  }

  function pause(){ playing=false; if (timer){ clearTimeout(timer); timer=null; } }

  // UI events
  playBtn.addEventListener('click', runFromCurrent);
  pauseBtn.addEventListener('click', ()=&gt;{
    if (playing){ pause(); pauseBtn.textContent='▶ Retomar'; }
    else { pauseBtn.textContent='⏸ Pausar'; runFromCurrent(); }
  });
  resetBtn.addEventListener('click', resetScene);

  // Click-to-seek
  lines.forEach((el, idx)=&gt;{
    el.title='Clique para pular para esta parte';
    el.addEventListener('click', ()=&gt;{ pause(); applyUpTo(cueForLine(idx)); });
  });

  // bootstrap
  resetScene();
})();

    &lt;div class=&quot;card&quot; style=&quot;font-size:13px; color:#9fb0c8&quot;&gt;
      Se HCl/H₂S não deram ppt, adiciona-se &lt;b&gt;(NH₄)₂S&lt;/b&gt; ao sobrenadante neutro.  
      Precipitados esperados: &lt;b&gt;Fe/Ni/Co&lt;/b&gt; negros; &lt;b&gt;Al/Zn&lt;/b&gt; brancos; &lt;b&gt;Cr&lt;/b&gt; verde-maçã; &lt;b&gt;Mn&lt;/b&gt; rosa.

&lt;script&gt;
(function(){
  const lines = Array.from(document.querySelectorAll('.line'));
  const showLine = (idx) =&gt; {
    lines.forEach(el =&gt; el.classList.remove('active'));
    if (idx&gt;=0 &amp;&amp; idx&lt;lines.length) lines[idx].classList.add('active');
  };

  // Elements
  const tubes = document.getElementById('tubes');
  const pip = document.getElementById('pipAmm');
  const drop = document.getElementById('dropAmm');

  const ppt = {
    Cr: document.getElementById('pptCr'),
    Al: document.getElementById('pptAl'),
    Fe: document.getElementById('pptFe'),
    Zn: document.getElementById('pptZn'),
    Ni: document.getElementById('pptNi'),
    Co: document.getElementById('pptCo'),
    Mn: document.getElementById('pptMn')
  };

  const playBtn = document.getElementById('play');
  const pauseBtn = document.getElementById('pause');
  const resetBtn = document.getElementById('reset');

  let playing=false, current=-1, timer=null;

  // Tube centers (group at x=280; step 80; center +35)
  const baseX = 230, step=80, c=35, topY=5;
  const X={ Cr:baseX+0*step+c, Al:baseX+1*step+c, Fe:baseX+2*step+c, Zn:baseX+3*step+c, Ni:baseX+4*step+c, Co:baseX+5*step+c, Mn:baseX+6*step+c };

  function setOpacity(el,v){ el.style.opacity=String(v); }
  function reveal(el){ el.classList.remove('hidden'); setOpacity(el,1); }
  function hide(el){ setOpacity(el,0); el.classList.add('hidden'); }
  function move(x,y){ pip.setAttribute('transform',`translate(${x},${y})`); }
  function dropOnce(){
    setOpacity(drop,1);
    drop.classList.remove('fall'); void drop.offsetWidth; drop.classList.add('fall');
    setTimeout(()=&gt; setOpacity(drop,0), 900);
  }
  function grow(r){ r.setAttribute('y','214'); r.setAttribute('height','36'); }

  function resetScene(){
    if (timer){ clearTimeout(timer); timer=null; }
    playing=false; current=-1;
    lines.forEach(el =&gt; el.classList.remove('active'));
    hide(tubes); hide(pip); setOpacity(drop,0); drop.classList.remove('fall');
    Object.values(ppt).forEach(r=&gt;{ r.setAttribute('y','236'); r.setAttribute('height','14'); setOpacity(r,0); });
    move(X.Cr, topY);
    pauseBtn.textContent='⏸ Pausar';
  }

  const steps=[
    {line:0, delay:700, fn:(i)=&gt;{ showLine(0); }},
    {line:1, delay:700, fn:(i)=&gt;{ showLine(1); }},
    {line:2, delay:900, fn:(i)=&gt;{ showLine(2); reveal(pip); move(X.Cr, topY); if(!i) dropOnce(); }},
    {line:3, delay:900, fn:(i)=&gt;{ showLine(3); }},
    {line:4, delay:600, fn:(i)=&gt;{ showLine(4); reveal(tubes); }},
    {line:5, delay:600, fn:(i)=&gt;{ showLine(5); }},
    {line:6, delay:600, fn:(i)=&gt;{ showLine(6); }},
    {line:7, delay:900, fn:(i)=&gt;{ showLine(7); Object.values(ppt).forEach(r=&gt;{ setOpacity(r,1); grow(r); }); }},
    // Fe, Ni, Co → black (already black fill; just ensure visible)
    {line:8, delay:1200, fn:(i)=&gt;{
      showLine(8); // move over Fe, Ni, Co with drops
      [['Fe',X.Fe],['Ni',X.Ni],['Co',X.Co]].forEach(([k,x],idx)=&gt;{
        setTimeout(()=&gt;{ move(x, topY); if(!i) dropOnce(); setOpacity(ppt[k],1); grow(ppt[k]); }, idx*250);
      });
    }},
    {line:9, delay:600, fn:(i)=&gt;{ showLine(9);} },
    // Al &amp; Zn → white
    {line:10, delay:800, fn:(i)=&gt;{ showLine(10); move(X.Al, topY); if(!i) dropOnce(); setOpacity(ppt.Al,1); grow(ppt.Al); }},
    {line:11, delay:800, fn:(i)=&gt;{ showLine(11); move(X.Zn, topY); if(!i) dropOnce(); setOpacity(ppt.Zn,1); grow(ppt.Zn); }},
    // Cr green
    {line:12, delay:600, fn:(i)=&gt;{ showLine(12);} },
    {line:13, delay:900, fn:(i)=&gt;{ showLine(13); move(X.Cr, topY); if(!i) dropOnce(); setOpacity(ppt.Cr,1); grow(ppt.Cr); }},
    // Mn pink
    {line:14, delay:600, fn:(i)=&gt;{ showLine(14);} },
    {line:15, delay:900, fn:(i)=&gt;{ showLine(15); move(X.Mn, topY); if(!i) dropOnce(); setOpacity(ppt.Mn,1); grow(ppt.Mn); }},
  ];

  const cueForLine=(idx)=&gt; Math.min(idx, steps.length-1);

  function applyUpTo(target){
    resetScene();
    for(let i=0;i&lt;=target;i++){ steps[i].fn(true); }
    current=target;
  }

  function runFromCurrent(){
    if (playing) return;
    playing=true;
    function next(){
      if (!playing) return;
      const n=current+1;
      if (n&gt;=steps.length){ playing=false; return; }
      current=n;
      const s=steps[current];
      s.fn(false);
      timer=setTimeout(next, s.delay);
    }
    next();
  }
  function pause(){ playing=false; if (timer){ clearTimeout(timer); timer=null; } }

  // UI
  document.getElementById('play').addEventListener('click', runFromCurrent);
  document.getElementById('pause').addEventListener('click', ()=&gt;{
    if (playing){ pause(); pauseBtn.textContent='▶ Retomar'; }
    else { pauseBtn.textContent='⏸ Pausar'; runFromCurrent(); }
  });
  document.getElementById('reset').addEventListener('click', resetScene);

  // Click-to-seek
  lines.forEach((el, idx)=&gt;{
    el.title='Clique para pular para esta parte';
    el.addEventListener('click', ()=&gt;{ pause(); applyUpTo(cueForLine(idx)); });
  });

  // bootstrap
  resetScene();
})();
&lt;/script&gt;

  const pipPyro = document.getElementById('pipPyro'), dropPyro = document.getElementById('dropPyro');

  // Flames (bottom row)
  const flBa = document.getElementById('flBa'), flSr = document.getElementById('flSr'), flCa = document.getElementById('flCa');
  const flK = document.getElementById('flK'), flNH4 = document.getElementById('flNH4'), flNa = document.getElementById('flNa'), flLi = document.getElementById('flLi');

  const playBtn = document.getElementById('play'), pauseBtn = document.getElementById('pause'), resetBtn = document.getElementById('reset');
  let playing=false, current=-1, timer=null;

  function setOpacity(el,v){ el.style.opacity=String(v); }
  function reveal(el){ el.classList.remove('hidden'); setOpacity(el,1); }
  function hide(el){ setOpacity(el,0); el.classList.add('hidden'); }
  function dropOnce(el){ setOpacity(el,1); el.classList.remove('fall'); void el.offsetWidth; el.classList.add('fall'); setTimeout(()=&gt;setOpacity(el,0), 900); }
  function grow(r){ r.setAttribute('y','214'); r.setAttribute('height','36'); }
  function resetFlames(){ [flBa,flSr,flCa,flK,flNH4,flNa,flLi].forEach(f=&gt; setOpacity(f,0)); }

  function resetScene(){
    if (timer){ clearTimeout(timer); timer=null; }
    playing=false; current=-1;
    lines.forEach(el =&gt; el.classList.remove('active'));
    hide(pipCO3); hide(pipSO4); hide(pipPt); hide(pipPyro);
    [dropCO3,dropSO4,dropPt,dropPyro].forEach(d=&gt;{ d.classList.remove('fall'); setOpacity(d,0); });
    [pptSr,pptBa,pptCa,pptMg,so4Sr,so4Ba,so4Ca,so4Mg,pptNH4,pptNa,pptK,pptLi].forEach(r=&gt;{ setOpacity(r,0); r.setAttribute('y','236'); r.setAttribute('height','14'); });
    resetFlames(); ['Ba','Sr','Ca','K','Na','Li','NH4'].forEach(ion=&gt; highlightIon(ion, false));
    pauseBtn.textContent='⏸ Pausar';
  }

  // Steps tied to lines (same timings; flames now appear on bottom row)
  
  // === Espectro (linhas) ===
  const spectro = document.getElementById('spectro');
  function nmToX(nm){
    
    const nmMin = 400, nmMax = 700;
    const xMin = 40, xMax = 820; // matches rect width 780 at x=40
    const clamped = Math.max(nmMin, Math.min(nm, nmMax));
    return xMin + (xMax - xMin) * (clamped - nmMin) / (nmMax - nmMin);
  }
  function wavelengthToRGB(nm){
    // Dan Bruton-ish approximation (clamped 400-700 nm), gamma 0.8
    let R=0, G=0, B=0, S=1.0;
    if (nm &lt; 400) nm = 400; if (nm &gt; 700) nm = 700;
    if (nm &gt;= 400 &amp;&amp; nm &lt; 440){ R = -(nm - 440)/(440-400); G = 0; B = 1; }
    else if (nm &lt; 490){ R = 0; G = (nm - 440)/(490-440); B = 1; }
    else if (nm &lt; 510){ R = 0; G = 1; B = -(nm - 510)/(510-490); }
    else if (nm &lt; 580){ R = (nm - 510)/(580-510); G = 1; B = 0; }
    else if (nm &lt; 645){ R = 1; G = -(nm - 645)/(645-580); B = 0; }
    else { R = 1; G = 0; B = 0; }
    // intensity factor at edges
    if (nm &gt;= 400 &amp;&amp; nm &lt; 420){ S = 0.3 + 0.7*(nm-400)/(420-400); }
    else if (nm &gt; 645 &amp;&amp; nm &lt;= 700){ S = 0.3 + 0.7*(700-nm)/(700-645); }
    const gamma = 0.8;
    const to255 = v =&gt; Math.round(255 * (v&lt;=0 ? 0 : (S * (v ** gamma))));
    return `rgb(${to255(R)}, ${to255(G)}, ${to255(B)})`;
  }
  const ionLines = {
    'Na': [589.0, 589.6],
    'K':  [404.4, 404.7],
    'Li': [670.8],
    'Sr': [606.0, 671.0],
    'Ba': [516.0, 524.0],
    'Ca': [422.7, 622.0],
    'NH4': []
  };
  
  function layoutSpectro(){
    ['Ba','Sr','Ca','K','Na','Li','NH4'].forEach(ion=&gt;{
      const g = spectro?.querySelector('#grp'+ion); if (!g) return;
      // remove old lines
      Array.from(g.querySelectorAll('line')).forEach(n=&gt;g.removeChild(n));
      const lines = ionLines[ion]||[];
      lines.forEach(wl=&gt;{
        const ln = document.createElementNS('http://www.w3.org/2000/svg','line');
        ln.setAttribute('class','specLine');
        ln.setAttribute('x1', nmToX(wl)); ln.setAttribute('x2', nmToX(wl));
        ln.setAttribute('y1','30'); ln.setAttribute('y2','90');
        ln.setAttribute('stroke', wavelengthToRGB(wl));
        ln.setAttribute('filter', 'url(#specGlow)');
        g.insertBefore(ln, g.firstChild);
      });
    });
  }
  function highlightIon(ion, on){
    const g = spectro?.querySelector('#grp'+ion); if (!g) return;
    g.style.display = on ? 'block' : 'none';
  }

  // Mostra só o íon atual: apaga chamas/linhas anteriores e liga a atual
  
  // Liga o íon atual e mantém os anteriores acesos (persistente até reset)
  
  // Acende só a chama (sem mostrar linhas do espectro)
  function onlyFlame(ion){
    const map = { Ba: flBa, Sr: flSr, Ca: flCa, K: flK, Na: flNa, Li: flLi, NH4: flNH4 };
    const el = map[ion];
    if (el){ setOpacity(el, 1); }
    // não mexe em highlightIon -&gt; espectro fica como está
  }

  function onlyIon(ion){
    const map = { Ba: flBa, Sr: flSr, Ca: flCa, K: flK, Na: flNa, Li: flLi, NH4: flNH4 };
    const el = map[ion];
    if (el){ setOpacity(el, 1); }
    if (ion !== 'NH4'){ highlightIon(ion, true); } // NH4 não tem linhas
  }


  layoutSpectro();
  ['Ba','Sr','Ca','K','Na','Li','NH4'].forEach(ion=&gt; highlightIon(ion, false));

  const steps = [
    {line:0, delay:700, fn:(i)=&gt;{ showLine(0); }},
    {line:1, delay:600, fn:(i)=&gt;{ showLine(1); }},
    {line:2, delay:600, fn:(i)=&gt;{ showLine(2); reveal(pipCO3); }},
    {line:3, delay:600, fn:(i)=&gt;{ showLine(3); }},
    {line:4, delay:1000, fn:(i)=&gt;{ showLine(4); dropOnce(dropCO3); [pptSr,pptBa,pptCa,pptMg].forEach(p=&gt;{ setOpacity(p,1); grow(p); }); }},
    {line:5, delay:700, fn:(i)=&gt;{ showLine(5); }},
    {line:6, delay:900, fn:(i)=&gt;{ showLine(6); reveal(pipSO4); dropOnce(dropSO4); [so4Sr,so4Ba,so4Ca].forEach(p=&gt;{ setOpacity(p,1); grow(p); }); }},
    {line:7, delay:700, fn:(i)=&gt;{ showLine(7); }},
    {line:8, delay:600, fn:(i)=&gt;{ showLine(8); onlyFlame('Ba'); }},
    {line:9, delay:600, fn:(i)=&gt;{ showLine(9); onlyFlame('Sr'); }},
    {line:10, delay:600, fn:(i)=&gt;{ showLine(10); onlyIon('Ca'); }},
    {line:11, delay:900, fn:(i)=&gt;{ showLine(11); }},

    // Second stanza
    {line:12, delay:700, fn:(i)=&gt;{ showLine(12); }},
    {line:13, delay:700, fn:(i)=&gt;{ showLine(13); }},
    {line:14, delay:700, fn:(i)=&gt;{ showLine(14); }},
    {line:15, delay:700, fn:(i)=&gt;{ showLine(15); onlyIon('Li'); }},
    {line:16, delay:700, fn:(i)=&gt;{ showLine(16); reveal(pipPt); }},
    {line:17, delay:900, fn:(i)=&gt;{ showLine(17); dropOnce(dropPt); setOpacity(pptK,1); grow(pptK); onlyIon('K'); }},
    {line:18, delay:700, fn:(i)=&gt;{ showLine(18); }},
    {line:19, delay:700, fn:(i)=&gt;{ showLine(19); onlyIon('NH4'); }},
    {line:20, delay:700, fn:(i)=&gt;{ showLine(20); reveal(pipPyro); }},
    {line:21, delay:900, fn:(i)=&gt;{ showLine(21); dropOnce(dropPyro); setOpacity(pptNa,1); grow(pptNa); }},
    {line:22, delay:700, fn:(i)=&gt;{ showLine(22); onlyIon('Na'); }},
  ];

  const cueForLine = (idx)=&gt; Math.min(idx, steps.length-1);
  function applyUpTo(target){ resetScene(); for(let i=0;i&lt;=target;i++){ steps[i].fn(true); } current=target; }
  function runFromCurrent(){
    if (playing) return; playing=true;
    const next = ()=&gt;{
      if (!playing) return;
      const n = current + 1; if (n&gt;=steps.length){ playing=false; return; }
      current = n; const s = steps[current]; s.fn(false); timer = setTimeout(next, s.delay);
    };
    next();
  }
  function pause(){ playing=false; if (timer){ clearTimeout(timer); timer=null; } }

  document.getElementById('play').addEventListener('click', runFromCurrent);
  document.getElementById('pause').addEventListener('click', ()=&gt;{ if (playing){ pause(); pauseBtn.textContent='▶ Retomar'; } else { pauseBtn.textContent='⏸ Pausar'; runFromCurrent(); } });
  document.getElementById('reset').addEventListener('click', resetScene);

  // Click-to-seek
  lines.forEach((el, idx)=&gt;{ el.title='Clique para pular para esta parte'; el.addEventListener('click', ()=&gt;{ pause(); applyUpTo(cueForLine(idx)); }); });

  resetScene();
})();

&lt;script&gt;
/* ========= setup ========= */
const DPR = Math.max(1, Math.min(2, window.devicePixelRatio || 1));
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d', { alpha: true });

function resizeCanvas(){
  const {innerWidth:w, innerHeight:h} = window;
  canvas.width = w * DPR; canvas.height = h * DPR;
  canvas.style.width = w + 'px'; canvas.style.height = h + 'px';
  ctx.setTransform(DPR,0,0,DPR,0,0);
  draw();
}
window.addEventListener('resize', resizeCanvas);

function getCSS(prop){
  try{
    const M={'--g0':'#ffffff','--g1':'#cdeafe','--g2':'#ffe7b9','--g3':'#d7f5d7','--g4':'#e8d5ff','--g5':'#ffd5e5'};
    if(M[prop]) return M[prop];
  } catch(e){}
  return getComputedStyle(document.documentElement).getPropertyValue(prop).trim();
}
/* ========= helpers ========= */
function roundRect(ctx, x,y,w,h,r){
  const rr = Math.max(0, Math.min(r, Math.min(w,h)/2));
  ctx.beginPath();
  ctx.moveTo(x+rr, y);
  ctx.arcTo(x+w, y, x+w, y+h, rr);
  ctx.arcTo(x+w, y+h, x, y+h, rr);
  ctx.arcTo(x, y+h, x, y, rr);
  ctx.arcTo(x, y, x+w, y, rr);
  ctx.closePath();
}
function worldToScreen(wx, wy){ return {x: wx*scale + panX, y: wy*scale + panY}; }
function screenToWorld(sx, sy){ return {x: (sx - panX)/scale, y:(sy - panY)/scale}; }
function clamp(v, a, b){return Math.max(a, Math.min(b, v));}
function newId(prefix='n'){ return prefix + Math.random().toString(36).slice(2,8); }

/* ========= dynamic groups ========= */
const baseGroups = {
  g0:{name:'Decisão / Genérico', color:getCSS('--g0')},
  g1:{name:'HCl (agaceele)', color:getCSS('--g1')},
  g2:{name:'H₂S (agadoiesse)', color:getCSS('--g2')},
  g3:{name:'(NH₄)₂S', color:getCSS('--g3')},
  g4:{name:'Alcalino-terrosos', color:getCSS('--g4')},
  g5:{name:'Alcalinos &amp; NH₄⁺', color:getCSS('--g5')}
};
let groups = JSON.parse(JSON.stringify(baseGroups)); // clone

let customIndex = 1;
function addCustomGroup(name, color){
  const id = 'gc' + (customIndex++);
  groups[id] = { name, color };
  rebuildLegend();
  rebuildNodeGroupSelect();
  return id;
}
function removeCustomGroup(id){
  if(!id.startsWith('gc')) return;
  delete groups[id];
  // Move nós desse grupo para g0
  for(const n of nodes) if(n.group===id) n.group = 'g0';
  rebuildLegend();
  rebuildNodeGroupSelect();
  draw();
}

function rebuildLegend(){
  const wrap = document.getElementById('legendStatic');
  wrap.innerHTML = '';
  const order = Object.keys(groups);
  for(const gid of order){
    const item = document.createElement('div');
    item.className = 'item legend-row';
    const sw = document.createElement('span');
    sw.className = 'sw'; sw.style.background = groups[gid].color;
    const text = document.createElement('span');
    text.textContent = groups[gid].name + (gid.startsWith('gc') ? ' (custom)' : '');
    item.appendChild(sw); item.appendChild(text);
    if(gid.startsWith('gc')){
      const btn = document.createElement('button');
      btn.className = 'btn'; btn.textContent = 'Remover';
      btn.addEventListener('click', ()=&gt; removeCustomGroup(gid));
      item.appendChild(btn);
    }
    wrap.appendChild(item);
  }
  // também lista os custom no painel de gerenciamento
  const list = document.getElementById('customLegendList');
  list.innerHTML = '';
  for(const gid of Object.keys(groups)){
    if(!gid.startsWith('gc')) continue;
    const row = document.createElement('div');
    row.className = 'legend-row';
    const sw = document.createElement('span'); sw.className='sw'; sw.style.background = groups[gid].color;
    const span = document.createElement('span'); span.textContent = groups[gid].name;

    row.appendChild(sw); row.appendChild(span); row.appendChild(btn);
    list.appendChild(row);
  }
}

function rebuildNodeGroupSelect(){
  const sel = document.getElementById('nodeGroup');
  sel.innerHTML = '';

  sel.appendChild(sep);

}

canvas.addEventListener('mousedown', (e)=&gt;{
  isMouseDown = true; isPanning = false;
  downX = lastX = e.clientX; downY = lastY = e.clientY;

  const pos = screenToWorld(e.clientX, e.clientY);
  const node = hitTestNode(pos.x, pos.y);
  const edgeInfo = hitTestEdgeHandle(e.clientX, e.clientY);

  if(node &amp;&amp; node.edit){
    draggingNode = { node, dx: pos.x - node.x, dy: pos.y - node.y };
  }else if(edgeInfo &amp;&amp; edgeInfo.edge.edit){
    draggingEdge = { edge: edgeInfo.edge };
    ensureEdgeCtrl(edgeInfo.edge);
  }
});

window.addEventListener('mouseup', (e)=&gt;{
  if(draggingNode){ draggingNode = null; }
  if(draggingEdge){ draggingEdge = null; }

  const moved = Math.hypot(e.clientX - downX, e.clientY - downY) &gt; 4;
  if(isMouseDown &amp;&amp; !isPanning &amp;&amp; !moved){
    const pos = screenToWorld(e.clientX, e.clientY);
    const node = hitTestNode(pos.x, pos.y);
    const edgeInfo = hitTestEdgeHandle(e.clientX, e.clientY);
    if(node){
      selectNode(node);
    }else if(edgeInfo){
      selectEdge(edgeInfo.edge);
    }else{
      clearSelection();
    }
  }
  isMouseDown = false; isPanning = false;
});

window.addEventListener('mousemove', (e)=&gt;{
  const pos = screenToWorld(e.clientX, e.clientY);
  if(draggingNode){
    draggingNode.node.x = pos.x - draggingNode.dx;
    draggingNode.node.y = pos.y - draggingNode.dy;
    draw(); return;
  }
  if(draggingEdge){
    draggingEdge.edge.ctrlYWorld = screenToWorld(0, e.clientY).y;
    draw(); return;
  }
  if(isMouseDown &amp;&amp; !isPanning){
    const moved = Math.hypot(e.clientX - downX, e.clientY - downY) &gt; 6;
    if(moved){
      const startPos = screenToWorld(downX, downY);
      if(!hitTestNode(startPos.x, startPos.y) &amp;&amp; !hitTestEdgeHandle(downX, downY)){
        isPanning = true;
      }
    }
  }
  if(isPanning){
    panX += (e.clientX - lastX);
    panY += (e.clientY - lastY);
    draw();
  }else{
    hoveredNode = hitTestNode(pos.x, pos.y);
    hoveredEdge = hitTestEdgeHandle(e.clientX, e.clientY)?.edge || null;
    canvas.style.cursor = hoveredNode || hoveredEdge ? 'pointer' : (isMouseDown ? 'grabbing' : 'grab');
  }
  lastX = e.clientX; lastY = e.clientY;
});

canvas.addEventListener('wheel', (e)=&gt;{
  e.preventDefault();
  const { clientX:mx, clientY:my, deltaY } = e;
  const zoom = Math.exp(-deltaY * 0.0015);
  const before = screenToWorld(mx, my);
  scale = clamp(scale * zoom, 0.4, 3.0);
  const after = screenToWorld(mx, my);
  panX += (mx - after.x*scale) - (mx - before.x*scale);
  panY += (my - after.y*scale) - (my - before.y*scale);
  draw();
}, {passive:false});

canvas.addEventListener('dblclick', (e)=&gt;{
  const posW = screenToWorld(e.clientX, e.clientY);
  const node = hitTestNode(posW.x, posW.y);
  const edgeInfo = hitTestEdgeHandle(e.clientX, e.clientY);

  if(node){
    node.edit = !node.edit;
    selectNode(node);
  }else if(edgeInfo){
    edgeInfo.edge.edit = !edgeInfo.edge.edit;
    selectEdge(edgeInfo.edge);
    ensureEdgeCtrl(edgeInfo.edge);
  }
  draw();
});

/* ========= hit tests ========= */
function hitTestNode(wx, wy){
  for(const n of nodes){
    if(wx&gt;=n.x &amp;&amp; wx&lt;=n.x+n.w &amp;&amp; wy&gt;=n.y &amp;&amp; wy&lt;=n.y+n.h) return n;
  }
  return null;
}
function hitTestEdgeHandle(sx, sy){
  for(const ed of edges){
    const info = getEdgeGeom(ed);
    const hx = info.handleX, hy = info.handleY;
    const d2 = (sx - hx)*(sx - hx) + (sy - hy)*(sy - hy);
    const R = 10;
    if(d2 &lt;= R*R) return {edge: ed, x:hx, y:hy};
  }
  return null;
}

/* ========= drawing ========= */
function draw(){
  const w = canvas.clientWidth, h = canvas.clientHeight;
  ctx.setTransform(1,0,0,1,0,0);
  ctx.clearRect(0,0,w,h);
  drawGrid();
  for(const e of edges) drawEdge(e);
  for(const n of nodes) drawNode(n);
}

function drawGrid(){
  const w = canvas.clientWidth, h = canvas.clientHeight;
  ctx.save();
  ctx.setTransform(scale,0,0,scale,panX,panY);
  const step = 50;
  const minx = -panX/scale - 2000, maxx = (w - panX)/scale + 2000;
  const miny = -panY/scale - 2000, maxy = (h - panY)/scale + 2000;
  ctx.beginPath();
  for(let x=Math.floor(minx/step)*step; x&lt;maxx; x+=step){ ctx.moveTo(x, miny); ctx.lineTo(x, maxy); }
  for(let y=Math.floor(miny/step)*step; y&lt;maxy; y+=step){ ctx.moveTo(minx, y); ctx.lineTo(maxx, y); }
  ctx.strokeStyle = 'rgba(255,255,255,0.04)';
  ctx.lineWidth = 1;
  ctx.stroke();
  ctx.restore();
}

function drawNode(n){
  const {x,y} = worldToScreen(n.x, n.y);
  const w = n.w*scale, h = n.h*scale;
  const r = Math.max(8, n.r*scale);

  ctx.save();
  ctx.translate(x, y);
  ctx.shadowColor = 'rgba(0,0,0,.35)';
  ctx.shadowBlur = 20; ctx.shadowOffsetY = 8;

  roundRect(ctx, 0,0, w,h, r);
  const g = groups[n.group];
  ctx.fillStyle = n.customColor || (g ? g.color : '#ffffff');
  ctx.fill();

  ctx.lineWidth = 1.5;
  ctx.strokeStyle = 'rgba(0,0,0,.25)';
  ctx.stroke();

  if(n.edit){
    ctx.setLineDash([6,4]);
    ctx.lineWidth = 2;
    ctx.strokeStyle = '#6ee7ff';
    ctx.stroke();
    ctx.setLineDash([]);
  }else if(hoveredNode === n){
    ctx.lineWidth = 2;
    ctx.strokeStyle = '#9acbff';
    ctx.stroke();
  }

  // clipping do texto
  ctx.save();
  roundRect(ctx, 0,0, w,h, Math.max(0,r-2));
  ctx.clip();

  const pad = 12 * scale;
  const lineTitle = Math.max(15, 16*scale);
  const lineBody  = Math.max(13, 14*scale);

  // Title (até 2 linhas)
  ctx.fillStyle = '#10121a';
  ctx.font = `${Math.max(12, 13*scale)}px Inter, system-ui`;
  ctx.textBaseline = 'top';
  let yy = pad;
  yy = drawWrappedEllipsis(ctx, n.title || '', pad, yy, w - pad*2, lineTitle, 2);

  yy += 6 * scale;

  // Preview (1–3 linhas conforme espaço)
  ctx.fillStyle = '#2b3249';
  ctx.font = `${Math.max(11, 12*scale)}px Inter, system-ui`;
  const preview = (n.detail||'').split('\n')[0];
  const remaining = h - yy - pad;
  const maxLines = Math.max(1, Math.min(3, Math.floor(remaining/lineBody)));
  if(remaining &gt; lineBody*0.5){
    drawWrappedEllipsis(ctx, preview, pad, yy, w - pad*2, lineBody, maxLines);
  }

  ctx.restore(); // clip
  ctx.restore(); // translate
}

function ensureEdgeCtrl(e){
  const geom = getEdgeGeom(e);
  if(typeof e.ctrlYWorld !== 'number'){
    e.ctrlYWorld = screenToWorld(0, geom.defaultCtrlY).y;
  }
}

function getEdgeGeom(e){
  const a = nodes.find(n=&gt;n.id===e.from);
  const b = nodes.find(n=&gt;n.id===e.to);
  const aC = {x:a.x + a.w/2, y:a.y + a.h};
  const bC = {x:b.x + b.w/2, y:b.y};

  const A = worldToScreen(aC.x, aC.y);
  const B = worldToScreen(bC.x, bC.y);
  const BgapY = B.y - ARROW_GAP;

  const defaultCtrlY = (A.y + BgapY)/2;
  const ctrlY = (typeof e.ctrlYWorld === 'number') ? worldToScreen(0, e.ctrlYWorld).y : defaultCtrlY;
  const handleX = (A.x + B.x)/2;
  const handleY = ctrlY;
  return {A, B, BgapY, ctrlY, defaultCtrlY, handleX, handleY};
}

function drawEdge(e){
  const {A, B, BgapY, ctrlY, handleX, handleY} = getEdgeGeom(e);

  ctx.save();
  ctx.beginPath();
  ctx.moveTo(A.x, A.y);
  ctx.bezierCurveTo(A.x, ctrlY, B.x, ctrlY, B.x, BgapY);
  ctx.lineWidth = 2;
  ctx.strokeStyle = 'rgba(180,200,255,.6)';
  ctx.stroke();

  // arrow head
  drawArrowHead(B.x, BgapY, Math.PI/2);

  // label
  if(e.label){
    ctx.font = '12px Inter, system-ui';
    ctx.fillStyle = '#c9d4ff';
    ctx.textAlign = 'center';
    ctx.fillText(e.label, (A.x+B.x)/2, ctrlY - 8);
  }

  // handle de edição (só quando em modo edição)
  if(e.edit){
    ctx.beginPath();
    ctx.arc(handleX, handleY, 6, 0, Math.PI*2);
    ctx.fillStyle = 'rgba(110,231,255,0.25)';
    ctx.fill();
    ctx.lineWidth = 2;
    ctx.strokeStyle = '#6ee7ff';
    ctx.stroke();
  }
  ctx.restore();
}

function drawArrowHead(x, y, angle){
  const s = ARROW_SIZE;
  ctx.save();
  ctx.translate(x, y);
  ctx.rotate(angle);
  ctx.beginPath();
  ctx.moveTo(0,0); ctx.lineTo(-s, -s); ctx.lineTo(s, -s); ctx.closePath();
  ctx.fillStyle = 'rgba(180,200,255,.9)';
  ctx.fill();
  ctx.restore();
}

/* === word-wrap com ELLIPSIS === */
function drawWrappedEllipsis(ctx, text, x, y, maxWidth, lineHeight, maxLines){
  const tokens = (text || '').toString().split(/(\s+)/);
  let line = '', lines = 0, yy = y;
  function putLine(out, isLast){
    let outText = out;
    if(isLast &amp;&amp; ctx.measureText(outText).width &gt; maxWidth){
      while(outText.length &gt; 0 &amp;&amp; ctx.measureText(outText + '…').width &gt; maxWidth){
        outText = outText.slice(0, -1);
      }
      outText += '…';
    }
    ctx.fillText(outText, x, yy);
    yy += lineHeight; lines++;
  }
  for(let i=0;i&lt;tokens.length;i++){
    const test = line + tokens[i];
    if(ctx.measureText(test).width &lt;= maxWidth){
      line = test;
    }else{
      putLine(line.trimEnd(), lines+1===maxLines);
      if(lines &gt;= maxLines) return yy;
      line = tokens[i].trimStart();
    }
  }
  if(lines &lt; maxLines &amp;&amp; line){ putLine(line.trimEnd(), false); }
  return yy;
}

document.getElementById('exportPngBtn').addEventListener('click', ()=&gt;{
  // ==== 1) Bounds em coordenadas de mundo ====
  function computeBounds(){
    if(!nodes || !nodes.length){
      return {minX:0, minY:0, maxX:1000, maxY:600};
    }
    let minX = Infinity, minY = Infinity, maxX = -Infinity, maxY = -Infinity;
    for(const n of nodes){
      minX = Math.min(minX, n.x);
      minY = Math.min(minY, n.y);
      maxX = Math.max(maxX, n.x + n.w);
      maxY = Math.max(maxY, n.y + n.h);
    }
    for(const e of edges){
      const a = nodes.find(n=&gt;n.id===e.from);
      const b = nodes.find(n=&gt;n.id===e.to);
      if(a &amp;&amp; b){
        const ax = a.x + a.w/2, ay = a.y + a.h;
        const bx = b.x + b.w/2, by = b.y;
        minX = Math.min(minX, ax, bx);
        maxX = Math.max(maxX, ax, bx);
        minY = Math.min(minY, ay, by);
        maxY = Math.max(maxY, ay, by);
        if(typeof e.ctrlYWorld === 'number'){
          minY = Math.min(minY, e.ctrlYWorld);
          maxY = Math.max(maxY, e.ctrlYWorld);
        }
      }
    }
    const pad = 60;
    return {minX:minX-pad, minY:minY-pad, maxX:maxX+pad, maxY:maxY+pad};
  }
  const B = computeBounds();
  const worldW = Math.max(1, B.maxX - B.minX);
  const worldH = Math.max(1, B.maxY - B.minY);

  // ==== 2) Canvas de export ====
  const scaleExport = 2;
  const exportCanvas = document.createElement('canvas');
  exportCanvas.width  = Math.ceil(worldW * scaleExport);
  exportCanvas.height = Math.ceil(worldH * scaleExport);
  const ex = exportCanvas.getContext('2d');
  ex.imageSmoothingEnabled = true;

  // fundo
  ex.fillStyle = getCSS('--bg') || '#0e0f12';
  ex.fillRect(0,0,exportCanvas.width, exportCanvas.height);

  // helpers locais
  function w2sX(wx){ return (wx - B.minX) * scaleExport; }
  function w2sY(wy){ return (wy - B.minY) * scaleExport; }
  function rr(ctx, x,y,w,h,r){
    const rr = Math.max(0, Math.min(r, Math.min(w,h)/2));
    ctx.beginPath();
    ctx.moveTo(x+rr, y);
    ctx.arcTo(x+w, y, x+w, y+h, rr);
    ctx.arcTo(x+w, y+h, x, y+h, rr);
    ctx.arcTo(x, y+h, x, y, rr);
    ctx.arcTo(x, y, x+w, y, rr);
    ctx.closePath();
  }
  function drawGridExp(){
    const step = 50 * scaleExport;
    ex.save();
    ex.beginPath();
    for(let x=0; x&lt;=exportCanvas.width; x+=step){ ex.moveTo(x, 0); ex.lineTo(x, exportCanvas.height); }
    for(let y=0; y&lt;=exportCanvas.height; y+=step){ ex.moveTo(0, y); ex.lineTo(exportCanvas.width, y); }
    ex.strokeStyle = 'rgba(255,255,255,0.04)';
    ex.lineWidth = 1;
    ex.stroke();
    ex.restore();
  }
  function drawArrowHeadExp(x, y, angle){
    const s = 5; // mesmo ARROW_SIZE
    ex.save();
    ex.translate(x, y);
    ex.rotate(angle);
    ex.beginPath();
    ex.moveTo(0,0); ex.lineTo(-s, -s); ex.lineTo(s, -s); ex.closePath();
    ex.fillStyle = 'rgba(180,200,255,.9)';
    ex.fill();
    ex.restore();
  }
  function drawWrappedEllipsisExp(ctx, text, x, y, maxWidth, lineHeight, maxLines){
    const tokens = (text || '').toString().split(/(\s+)/);
    let line = '', lines = 0, yy = y;
    function putLine(out, isLast){
      let outText = out;
      if(isLast &amp;&amp; ctx.measureText(outText).width &gt; maxWidth){
        while(outText.length &gt; 0 &amp;&amp; ctx.measureText(outText + '…').width &gt; maxWidth){
          outText = outText.slice(0, -1);
        }
        outText += '…';
      }
      ctx.fillText(outText, x, yy);
      yy += lineHeight; lines++;
    }
    for(let i=0;i&lt;tokens.length;i++){
      const test = line + tokens[i];
      if(ctx.measureText(test).width &lt;= maxWidth){
        line = test;
      }else{
        putLine(line.trimEnd(), lines+1===maxLines);
        if(lines &gt;= maxLines) return yy;
        line = tokens[i].trimStart();
      }
    }
    if(lines &lt; maxLines &amp;&amp; line){ putLine(line.trimEnd(), false); }
    return yy;
  }
  function drawNodeExp(n){
    const x = w2sX(n.x), y = w2sY(n.y);
    const w = n.w * scaleExport, h = n.h * scaleExport;
    const r = Math.max(8, (n.r||14) * scaleExport);

    ex.save();
    ex.translate(x, y);
    ex.shadowColor = 'rgba(0,0,0,.35)';
    ex.shadowBlur = 20; ex.shadowOffsetY = 8;

    rr(ex, 0,0, w,h, r);
    const g = groups[n.group];
    ex.fillStyle = n.customColor || (g ? g.color : '#ffffff');
    ex.fill();

    ex.lineWidth = 1.5;
    ex.strokeStyle = 'rgba(0,0,0,.25)';
    ex.stroke();

    // clipping do texto
    ex.save();
    rr(ex, 0,0, w,h, Math.max(0,r-2));
    ex.clip();

    const pad = 12 * scaleExport;
    const lineTitle = Math.max(15, 16*scaleExport);
    const lineBody  = Math.max(13, 14*scaleExport);

    ex.fillStyle = '#10121a';
    ex.font = `${Math.max(12, 13*scaleExport)}px Inter, system-ui`;
    ex.textBaseline = 'top';
    let yy = pad;
    yy = drawWrappedEllipsisExp(ex, n.title || '', pad, yy, w - pad*2, lineTitle, 2);

    yy += 6 * scaleExport;

    ex.fillStyle = '#2b3249';
    ex.font = `${Math.max(11, 12*scaleExport)}px Inter, system-ui`;
    const preview = (n.detail||'').split('\n')[0];
    const remaining = h - yy - pad;
    const maxLines = Math.max(1, Math.min(3, Math.floor(remaining/lineBody)));
    if(remaining &gt; lineBody*0.5){
      drawWrappedEllipsisExp(ex, preview, pad, yy, w - pad*2, lineBody, maxLines);
    }

    ex.restore(); // clip
    ex.restore(); // translate
  }
  function drawEdgeExp(e){
    const a = nodes.find(n=&gt;n.id===e.from);
    const b = nodes.find(n=&gt;n.id===e.to);
    if(!a || !b) return;
    const Ax = w2sX(a.x + a.w/2), Ay = w2sY(a.y + a.h);
    const Bx = w2sX(b.x + b.w/2), By = w2sY(b.y);
    const BgapY = By - 12; // ARROW_GAP export

    const defaultCtrlY = (Ay + BgapY)/2;
    const ctrlY = (typeof e.ctrlYWorld === 'number') ? w2sY(e.ctrlYWorld) : defaultCtrlY;
    const midX = (Ax + Bx)/2;

    ex.save();
    ex.beginPath();
    ex.moveTo(Ax, Ay);
    ex.bezierCurveTo(Ax, ctrlY, Bx, ctrlY, Bx, BgapY);
    ex.lineWidth = 2;
    ex.strokeStyle = 'rgba(180,200,255,.6)';
    ex.stroke();

    drawArrowHeadExp(Bx, BgapY, Math.PI/2);

    if(e.label){
      ex.font = '12px Inter, system-ui';
      ex.fillStyle = '#c9d4ff';
      ex.textAlign = 'center';
      ex.fillText(e.label, midX, ctrlY - 8);
    }
    ex.restore();
  }

  // Render
  drawGridExp();
  for(const e of edges) drawEdgeExp(e);
  for(const n of nodes) drawNodeExp(n);

  const url = exportCanvas.toDataURL('image/png');
  const a = document.createElement('a'); a.href = url; a.download = 'fluxograma_marcha_cations_full.png'; a.click();
});

/* ==== import layout from JSON ==== */
document.getElementById('fileLayoutIn').addEventListener('change', (ev)=&gt;{
  const file = ev.target.files &amp;&amp; ev.target.files[0];
  if(!file) return;
  const reader = new FileReader();
  reader.onload = ()=&gt;{
    try{
      const obj = JSON.parse(reader.result);
      importLayout(obj);
    }catch(err){
      alert('Arquivo inválido. Certifique-se de selecionar o JSON exportado.');
      console.error(err);
    }
  };
  reader.readAsText(file);
  ev.target.value = ''; // reset input
});

function importLayout(obj){
  // 1) Groups (merge; custom groups substituem mesmas chaves)
  if(obj.groups &amp;&amp; typeof obj.groups === 'object'){
    groups = Object.assign({}, groups, obj.groups);
    rebuildLegend();
    rebuildNodeGroupSelect();
  }

  // 2) Nodes
  if(Array.isArray(obj.nodes)){
    // Replace; ensure defaults
    nodes = obj.nodes.map(n =&gt; ({
      id: n.id,
      x: +n.x || 0, y: +n.y || 0,
      w: n.w ?? 260, h: n.h ?? 100, r: n.r ?? 14,
      group: n.group || (n.customColor ? '' : 'g0'),
      customColor: n.customColor || null,
      title: n.title || '',
      detail: n.detail || '',
      versos: n.versos || '—',
      edit: false
    }));
  }else if(obj.nodesById){ // fallback format
    for(const [id, nz] of Object.entries(obj.nodesById)){
      const n = nodes.find(x =&gt; x.id === id);
      if(!n) continue;
      if(typeof nz.x === 'number') n.x = nz.x;
      if(typeof nz.y === 'number') n.y = nz.y;
      if(typeof nz.w === 'number') n.w = nz.w;
      if(typeof nz.h === 'number') n.h = nz.h;
    }
  }

  // 3) Edges
  if(Array.isArray(obj.edges)){
    edges = obj.edges.map(e =&gt; ({
      from: e.from, to: e.to, label: e.label || '',
      ctrlYWorld: (typeof e.ctrlYWorld === 'number') ? e.ctrlYWorld : null,
      edit: false
    }));
  }

  clearSelection();
  updatePositionsPanel();
  draw();
}

function serializeLayout(){
  return {
    nodes: nodes.map(n =&gt; ({ id:n.id, x:n.x, y:n.y, w:n.w, h:n.h, r:n.r, group:n.group, customColor:n.customColor||null, title:n.title, detail:n.detail, versos:n.versos })),
    edges: edges.map(e =&gt; ({ from:e.from, to:e.to, label:e.label || '', ctrlYWorld: (typeof e.ctrlYWorld==='number'? e.ctrlYWorld : null) })),
    groups: groups
  };
}
function updatePositionsPanel(){
  const lines = nodes.map(n =&gt; `${n.id.padEnd(10)}  x:${n.x.toFixed(1).padStart(7)}  y:${n.y.toFixed(1).padStart(7)}  w:${n.w}  h:${n.h}  group:${n.group||'-'}`).join('\n');
  posPre.textContent = lines || '(nenhum)';
  const det = document.getElementById('posDetails'); if(det &amp;&amp; !det.open) det.open = true;
}

})();
