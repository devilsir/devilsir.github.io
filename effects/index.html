<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Models and animations</title>
<link rel="stylesheet" href="./css/style.css">
</head>
<body>
<div id="app"></div>
<div id="loading">Carregando modelo e animações…</div>
<div id="ui">
<h1>Modelos e animações</h1>
<p>Personagens, armas, spells, animações e pets.</p>
<div class="row stack">
<div>
<label>Personagem</label>
<select id="modelSelect"></select>
</div>
</div>
<div class="row stack">
<div>
<label>Escolher animação</label>
<select id="animationSelect"></select>
</div>
</div>
<div class="row">
<button id="prevBtn" class="secondary">Anterior</button>
<button id="playBtn">Play</button>
<button id="nextBtn" class="secondary">Próxima</button>
</div>
<div class="row">
<button id="fxOnlyBtn" class="ghost">Só com efeitos</button>
<button id="resetCamBtn" class="ghost">Resetar câmera</button>
</div>
<div class="row stack">
<div>
<label>Efeito</label>
<select id="fxMode">
<option value="auto">Auto</option>
<option value="none">Sem efeito</option>
<option value="fire">Bolas de fogo</option>
<option value="ice">Rajadas de gelo</option>
<option value="lightning">Raios pelas mãos</option>
<option value="wind">Vento</option>
<option value="lava">Lava</option>
<option value="earth">Terra</option>
<option value="water">Água</option>
<option value="shadow">Sombra</option>
<option value="light">Luz</option>
<option value="crystal">Cristal</option>
<option value="void">Void</option>
</select>
</div>
<div>
<label>Item na mão</label>
<select id="handItemMode">
<option value="none">Nenhum</option>
<option value="sword">Espada</option>
</select>
</div>
<div>
<label>Pet</label>
<select id="petMode"></select>
</div>
<div>
<label>Modo</label>
<select id="qualityMode">
<option value="normal">Normal</option>
<option value="performance">Desempenho</option>
</select>
</div>
<div>
<label>Velocidade da animação</label>
<input id="speedRange" type="range" min="0.25" max="1.75" step="0.05" value="1">
</div>
</div>
<div id="status">
<span class="badge" id="currentAnimBadge">Animação: -</span>
<span class="badge" id="currentFxBadge">FX: -</span>
</div>
<div id="hint">Arraste pra girar a câmera. Scroll dá zoom. O efeito automático entra nas animações que combinam melhor.</div>
</div>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/build/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>
<script src="./js/asset-paths.js"></script>
<script src="./js/app.js"></script>
</body>
</html>
